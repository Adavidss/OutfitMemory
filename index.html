<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!--
    Privacy by policy, enforced by the browser.

    `default-src 'self'` blocks everything by default. The exceptions:

    DOWNLOAD-ONLY (fetch models/runtimes, nothing is sent):
      • cdn.jsdelivr.net — transformers.js + MediaPipe runtimes (script/wasm)
      • huggingface.co / *.hf.co — FashionCLIP weights
      • storage.googleapis.com — MediaPipe person-parsing model

    UPLOAD-CAPABLE, OPT-IN (exists for exactly one feature):
      • generativelanguage.googleapis.com — "Find where to buy". Inert until
        the user pastes their own Gemini API key in Settings; only then can
        an ITEM CROP be sent, and only when they tap the button.

    There is still no form-action target. Skip the optional features and the
    app makes no network requests at all.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 img-src 'self' blob: data:;
                 media-src blob:;
                 style-src 'self';
                 script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net;
                 connect-src 'self' blob: data: https://cdn.jsdelivr.net https://huggingface.co https://*.hf.co https://cdn-lfs.huggingface.co https://cdn-lfs-us-1.huggingface.co https://storage.googleapis.com https://generativelanguage.googleapis.com;
                 worker-src 'self' blob:;
                 child-src 'self' blob:;
                 manifest-src 'self';
                 object-src 'none';
                 form-action 'none';
                 base-uri 'self'">
  <title>OutfitMemory</title>
  <meta name="description" content="A private, local-first outfit journal. One photo a day — your photos never leave your device.">
  <meta name="theme-color" content="#ffffff">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="OutfitMemory">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
</head>
<body>
  <noscript>
    <p>OutfitMemory is a local-first app and needs JavaScript to manage your photo archive on-device.</p>
  </noscript>

  <!-- Main app chrome (hidden until setup is complete) -->
  <div id="app" hidden>
    <header id="topbar" class="topbar"></header>
    <main id="view"></main>
    <nav id="tabbar" class="tabbar" aria-label="Main navigation"></nav>
  </div>

  <!-- Full-screen states: onboarding / unlock -->
  <div id="screen" hidden></div>

  <!-- Overlay layer: sheets, dialogs, lightbox, capture, wrapped -->
  <div id="layer"></div>

  <!-- Toasts -->
  <div id="toasts" aria-live="polite"></div>

  <!-- Native pickers. `capture` opens the system camera on phones. -->
  <input type="file" id="fileCamera" accept="image/*" capture="environment" hidden>
  <input type="file" id="fileLibrary" accept="image/*" multiple hidden>
  <input type="file" id="fileImport" accept=".zip,.json,application/zip,application/json" hidden>

  <script type="module" src="js/app.js"></script>
</body>
</html>
